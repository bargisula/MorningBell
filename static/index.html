<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晨鐘 MorningBell — 每天 5 分鐘，看懂美股</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>

<header class="masthead">
  <div class="brand">
    <svg class="bell" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3c-3.5 0-6 2.7-6 6.2V13l-1.6 2.6c-.4.7.1 1.4.9 1.4h13.4c.8 0 1.3-.7.9-1.4L18 13V9.2C18 5.7 15.5 3 12 3Z"
            fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
      <path d="M10 19.5a2 2 0 0 0 4 0" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    </svg>
    <h1>晨鐘 <span class="latin">MorningBell</span></h1>
  </div>
  <p class="tagline">每天 5 分鐘，看懂美股</p>
</header>

<nav class="tabs" role="tablist">
  <button class="tab active" data-tab="brief">今日晨報</button>
  <button class="tab" data-tab="checkup">個股健檢</button>
  <button class="tab" data-tab="watchlist">觀察清單</button>
</nav>

<main>
  <section id="panel-brief" class="panel active" aria-live="polite">
    <div class="loading">正在為你整理今天的晨報⋯（第一次載入約需十幾秒）</div>
  </section>

  <section id="panel-checkup" class="panel">
    <form id="checkup-form" class="ticker-form">
      <input id="checkup-input" type="text" placeholder="輸入美股代號，例如 AAPL"
             autocomplete="off" spellcheck="false" maxlength="10">
      <button type="submit">開始健檢</button>
    </form>
    <div id="checkup-result">
      <p class="hint">輸入一支股票的代號，我用三張卡告訴你：它貴不貴、體質好不好、有沒有紅旗。</p>
    </div>
  </section>

  <section id="panel-watchlist" class="panel">
    <form id="watch-form" class="ticker-form">
      <input id="watch-input" type="text" placeholder="加入想追蹤的代號，例如 NVDA"
             autocomplete="off" spellcheck="false" maxlength="10">
      <button type="submit">加入清單</button>
    </form>
    <div id="watch-list"><div class="loading">載入中⋯</div></div>
    <p class="hint">加進清單的股票，每天的晨報會自動幫你盯著。</p>
  </section>
</main>

<footer>
  <p>資料來源：Yahoo Finance（延遲報價）。本工具僅供資訊參考，<strong>不構成投資建議</strong>。</p>
  <p class="foot-brand">晨鐘 MorningBell · 開源專案</p>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
